title: SupportsAudioOutput Interface Design
status: draft
author: nextain/vllm fork
last_updated: 2026-03-16
issue_ref: naia-os#73

scope_decision:
  qwen2_audio: out_of_scope
  rationale: "테스트 범위가 너무 넓어짐. MiniCPM-o 전용으로 구현 후 실증."
  upstream_response: "upstream이 generality 요구 시 Luke가 직접 논의. 범위 확장은 별도 PR."

implementation_principle:
  rule: "코드는 가능한 한 간결하게"
  rationale: |
    실제 코드 리뷰가 필요할 수 있음 (Luke가 메인테이너 앞에서 모든 라인을 방어해야 함).
    라인 수가 적을수록 리뷰 부담이 줄고, 설명이 쉬워지고, 메인테이너가 머지할 가능성이 높아짐.
  constraints:
    - "Protocol 정의: 필수 메서드만. 확장 가능성을 위한 메서드 미리 추가 금지"
    - "MiniCPM-o 구현: Token2wav 연동만. 부가 기능 없음"
    - "API 엔드포인트: OpenAI spec 최소 구현. 옵션 파라미터 최소화"
    - "주석: 왜(why) 설명만. 무엇(what)은 코드가 말함"
    - "헬퍼 함수: 두 곳 이상 쓰이지 않으면 만들지 않음"

# ============================================================
# SECTION 1: Background
# ============================================================
background:
  problem: |
    vLLM supports SupportsTranscription (audio input → text) and SupportsRealtime
    (streaming audio I/O), but has no interface for models that generate audio output
    from text input (TTS / audio generation).
    MiniCPM-o 4.5 can generate audio tokens alongside text tokens, but vLLM has no
    standard way to route audio token output through the API server.
  target_model: MiniCPM-o 4.5 (openbmb/MiniCPM-o-2_6)
  use_case: Naia OS voice response — model generates speech audio from chat response

  existing_patterns:
    SupportsTranscription:
      direction: audio-in → text-out
      interface_file: vllm/model_executor/models/interfaces.py:1066
      registry_file: vllm/model_executor/models/registry.py:679
      example_model: Whisper
    SupportsRealtime:
      direction: streaming audio-in + audio-out (bidirectional)
      interface_file: vllm/model_executor/models/interfaces.py:1031
    SupportsMultiModal:
      direction: any modality input + text output
      interface_file: vllm/model_executor/models/interfaces.py:89

# ============================================================
# SECTION 2: Interface design (draft)
# ============================================================
proposed_interface:
  name: SupportsAudioOutput
  location: vllm/model_executor/models/interfaces.py
  follows_pattern: SupportsTranscription + SupportsRealtime

  protocol_sketch: |
    @runtime_checkable
    class SupportsAudioOutput(Protocol):
        """Interface for models that generate audio tokens as output.

        Models implementing this interface produce audio tokens alongside or
        instead of text tokens. Audio token sequences are decoded by a
        vocoder/codec to produce waveform audio.
        """

        supports_audio_output: ClassVar[Literal[True]] = True

        audio_output_sample_rate: ClassVar[int]
        """Sample rate of generated audio (Hz). e.g. 24000 for MiniCPM-o."""

        audio_token_ids: ClassVar[frozenset[int]]
        """Set of token IDs that represent audio tokens (not text)."""

        @classmethod
        def decode_audio_tokens(
            cls,
            token_ids: list[int],
            model_config: ModelConfig,
        ) -> np.ndarray:
            """Decode audio token IDs to a waveform (float32, shape [samples]).

            The model is responsible for invoking its vocoder/codec.
            """
            ...

        @classmethod
        def get_audio_output_config(
            cls,
            model_config: ModelConfig,
        ) -> AudioOutputConfig:
            """Return audio output configuration for this model."""
            ...

  helper_function: |
    @overload
    def supports_audio_output(model: type[object]) -> TypeIs[type[SupportsAudioOutput]]: ...

    @overload
    def supports_audio_output(model: object) -> TypeIs[SupportsAudioOutput]: ...

    def supports_audio_output(
        model: type[object] | object,
    ) -> TypeIs[type[SupportsAudioOutput]] | TypeIs[SupportsAudioOutput]:
        return getattr(model, "supports_audio_output", False)

  registry_addition: |
    # In registry.py ModelInfo:
    supports_audio_output: bool

    # In registry.py _get_model_info():
    supports_audio_output=supports_audio_output(model),

  config_addition: |
    # New config class (vllm/config.py or vllm/entrypoints/openai/protocol.py)
    @dataclass
    class AudioOutputConfig:
        sample_rate: int
        format: Literal["pcm_f32", "wav", "ogg"] = "pcm_f32"

# ============================================================
# SECTION 3: API server integration
# ============================================================
api_integration:
  endpoint: POST /v1/audio/speech (OpenAI-compatible TTS endpoint)
  alternative: Extend chat completions with audio output option
  decision_needed: |
    Option A: New /v1/audio/speech endpoint (clean separation, matches OpenAI API)
    Option B: Chat completions response includes audio chunks (complex, non-standard)
    Recommended: Option A — upstream is more likely to accept a clean new endpoint

  openai_reference: |
    OpenAI TTS API: POST /v1/audio/speech
    Input: { model, input (text), voice, response_format, speed }
    Output: binary audio stream

  vllm_adaptation: |
    - Request: SpeechRequest(model, input, voice?, response_format?, speed?)
    - Route: if supports_audio_output(model_class) → SpeechHandler
    - Handler: tokenize input → generate audio tokens → decode via model.decode_audio_tokens()
    - Response: StreamingResponse(audio_bytes, media_type="audio/wav")

# ============================================================
# SECTION 4: MiniCPM-o specific notes
# ============================================================
minicpmo_notes:
  model_id: openbmb/MiniCPM-o-2_6
  audio_output_mechanism: Token2wav vocoder
  audio_token_prefix: "tts"  # skip_prefixes=["tts"] in generation config
  sample_rate: 24000
  known_limitations:
    - INT4 quantization does not support TTS (bitsandbytes doesn't init TTS modules)
    - Duplex mode requires ~28GB VRAM (24GB GPU: use half-duplex only)
    - Token2wav requires reference audio; text-only input needs silent reference
  init_sequence: |
    # 3-step initialization required (from naia-os#33 experience):
    model = AutoModel.from_pretrained(..., init_tts=True)  # skeleton only
    model.init_tts()  # actually initializes Token2wav vocoder
    # chat(..., generate_audio=True, output_audio_path="out.wav")  # saves to file

# ============================================================
# SECTION 5: Upstream RFC strategy
# ============================================================
upstream_strategy:
  step1: Build working implementation on fork (Phase 4)
  step2: Open GitHub Discussion / RFC Issue on vllm-project/vllm
  step3: Get feedback on interface design before polishing PR
  step4: Polish to upstream quality standards (all harness gates pass)
  step5: Open PR with full test evidence and duplicate check
  rationale: |
    vLLM maintainers are skeptical of AI-generated PRs.
    RFC-first approach shows design thinking and invites collaboration,
    which increases acceptance probability significantly.
    Implementing on fork first provides concrete evidence that it works.

# ============================================================
# SECTION 6: Upstream discussion prep (AI assists Luke)
# ============================================================
# These are design questions upstream maintainers WILL ask.
# AI's role: prepare the arguments so Luke enters the discussion ready.
# Luke's role: lead the actual discussion, judge tradeoffs, respond.
# ============================================================
upstream_discussion_prep:

  q1:
    question: "Why a new Protocol instead of extending SupportsTranscription or SupportsRealtime?"
    argument: |
      SupportsTranscription: audio-in → text-out (ASR direction)
      SupportsRealtime: streaming bidirectional audio I/O (WebRTC-style)
      SupportsAudioOutput: text-in → audio-out (TTS direction)
      These are orthogonal capabilities. A model can support transcription AND audio output
      (e.g. MiniCPM-o supports both). Merging them would violate single-responsibility
      and break existing SupportsTranscription implementations.
    supporting_evidence: "interfaces.py already separates SupportsMultiModal, SupportsTranscription, SupportsRealtime as distinct Protocols — same pattern."

  q2:
    question: "Why only MiniCPM-o? Interface seems too narrow for one model."
    argument: |
      This is a proof-of-concept implementation. The Protocol is designed to be
      model-agnostic (decode_audio_tokens takes only token_ids + model_config).
      MiniCPM-o is the first implementation because it's the only model we have
      test infrastructure for. The interface does not hard-code MiniCPM-o anywhere.
      Other models can implement it without changes to the Protocol.
    scope_decision: "Qwen2-Audio extension is explicitly out of scope for this PR — test surface too wide. Can be a follow-up."
    note_for_luke: "If maintainer insists on a second implementation, negotiate: 'We can add a stub for Qwen2-Audio in a follow-up PR once the interface is merged.'"

  q3:
    question: "Token2wav adds a new dependency. How do you handle optional install?"
    argument: |
      Token2wav is loaded lazily inside decode_audio_tokens() with a clear ImportError message:
        try:
            from minicpmo.token2wav import Token2wav
        except ImportError:
            raise ImportError(
                "Token2wav is required for audio output. "
                "Install with: pip install vllm[audio-output]"
            )
      This pattern matches how vLLM already handles optional deps (e.g. flashinfer, lm-format-enforcer).
      No mandatory dependency is added to core requirements.
    reference: "See vllm/model_executor/layers/quantization/ for existing optional-dep patterns."

  q4:
    question: "Does /v1/audio/speech need an RFC before this PR?"
    argument: |
      The endpoint strictly follows OpenAI TTS API spec (POST /v1/audio/speech).
      vLLM's stated goal is OpenAI API compatibility. This is an extension of that goal,
      not a novel API surface. The interface Protocol (SupportsAudioOutput) can be merged
      first as a smaller PR; the endpoint can follow separately after interface approval.
    pr_split_proposal: |
      PR-1 (small): interfaces.py + registry.py — SupportsAudioOutput Protocol only
      PR-2 (after PR-1 merged): MiniCPM-o implementation + Token2wav optional dep
      PR-3 (after discussion): /v1/audio/speech endpoint
    note_for_luke: "If maintainer still wants RFC for the endpoint, offer to open a Discussion first and proceed with PR-1 only."

  q5:
    question: "How do we know skip_prefixes=[tts] removal doesn't break existing text output?"
    argument: |
      skip_prefixes is used to prevent TTS-prefix tokens from appearing in text responses.
      In SupportsAudioOutput mode, the model is invoked via decode_audio_tokens() which
      routes audio tokens to Token2wav — they never enter the text output path.
      Existing text generation path is unchanged; the new code path is additive only.
    test_evidence_needed: "pytest tests/models/ with MiniCPM-o text-only generation must pass. Include in PR."

  q6:
    question: "What tests are included?"
    minimum_required:
      - "tests/models/test_minicpmo_audio_output.py — decode_audio_tokens produces valid waveform"
      - "tests/models/test_minicpmo_text_regression.py — existing text output path unchanged"
      - "tests/entrypoints/openai/test_audio_speech.py — /v1/audio/speech endpoint (PR-3)"
    pr_description_must_include: |
      pytest tests/models/test_minicpmo_audio_output.py -v: PASSED
      pytest tests/models/test_minicpmo_text_regression.py -v: PASSED
      pre-commit run --all-files: PASSED
      AI assistance used: Claude (reviewed and defended end-to-end by Luke N)
